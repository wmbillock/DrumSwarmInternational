# MCP Instrument Configuration
# Maps external MCP servers and their tools to DCI Swarm roles.
#
# Each instrument defines:
#   name: Namespace prefix for tool names (e.g. github.create_issue)
#   config: Connection config for the MCP server
#   roles: Which DCI roles can use these tools
#   tools: List of tool definitions with name, description, and input_schema

instruments: []
