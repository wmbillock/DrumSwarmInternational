## DCI Swarm — Operating Budget Configuration
## Override any value via environment variables prefixed with DSI_
## e.g. DSI_MAX_CONCURRENT_PROCESSES=3, DSI_MAX_DAILY_SPEND_USD=5.0

global:
  max_concurrent_processes: 5
  max_daily_spend_usd: 10.0
  max_session_spend_usd: 0.50

corps:
  max_agents_per_corps: 3
  max_daily_spend_per_corps_usd: 5.0

provider_costs:
  claude-cli:
    input_per_1m: 3.0
    output_per_1m: 15.0
  anthropic-api:
